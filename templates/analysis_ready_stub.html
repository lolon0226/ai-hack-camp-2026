<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>통합 결과확인 · 래드리본 병원용</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="hospital-analysis-stub-page">
  <header class="hospital-start-header">
    <div class="hospital-start-header__inner">
      <a class="brand brand--compact" href="/hospital/start" aria-label="병원용 래드리본">
        <span class="brand__mark" aria-hidden="true"></span>
        <span class="brand__text">
          <span class="brand__name-ko">래드리본</span>
          <span class="brand__name-en">RedRibbon</span>
        </span>
      </a>
      <a class="hospital-start-header__back" href="/">서비스 선택</a>
    </div>
  </header>

  <main class="hospital-analysis-stub-main">
    {% include "partials/step_bar.html" %}

    <section class="hospital-analysis-stub-hero" aria-labelledby="analysis-stub-title">
      <h1 id="analysis-stub-title" class="hospital-analysis-stub-title">다음 단계: 통합 결과확인</h1>
      <p class="hospital-analysis-stub-lead">
        진료내역과 보험가입이력을 결합해 청구 가능성 분석 준비를 진행합니다.
      </p>
      <p class="hospital-analysis-stub-note">이 화면은 다음 작업에서 확장 예정입니다.</p>
      <p>
        <a class="btn btn--ghost" href="/hospital/insurance-request?flow_id={{ flow_id }}">보험가입이력 단계로 돌아가기</a>
      </p>
    </section>
  </main>

  <footer class="hospital-start-footer">
    <p>
      본선 시연에서는 실제 개인정보가 아닌 테스트 데이터를 사용합니다.<br />
      실제 서비스에서는 고객 본인확인과 명시적 동의 후 필요한 범위에서만 정보를 조회합니다.
    </p>
  </footer>
</body>
</html>
